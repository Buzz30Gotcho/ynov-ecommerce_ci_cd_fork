name: CI

on:
  push:
    branches: [main, feature/feature-flags]
  pull_request:
    branches: [main, feature/feature-flags]

jobs:
  test:
    name: Run Tests & SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 🔥 IMPORTANT : force coverage explicitement
      - name: Run Tests with Coverage
        run: npm test -- --coverage

      # 🔍 Debug (utile tant que ça marche pas à 100%)
      - name: Check coverage file
        run: |
          ls -R coverage || true
          cat coverage/lcov.info || true

      # ❌ SUPPRIMÉ : sed inutile et risqué

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=src/test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}