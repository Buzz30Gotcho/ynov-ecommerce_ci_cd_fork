name: CI

on:
  push:
    branches: [main, feature/feature-flags]
  pull_request:
    branches: [main, feature/feature-flags]

jobs:
  test:
    name: Run Tests & SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm test

      - name: Fix Coverage Paths
        run: |
          # Enlève le préfixe src/ pour que SonarCloud (qui pointe déjà sur src) trouve les fichiers
          sed -i 's|SF:src/|SF:|g' coverage/lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
